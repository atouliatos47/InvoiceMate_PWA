<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0ea5a0" />
  <meta name="description" content="Simple invoice app for self-employed" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>InvoiceMate</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- ── Top bar ─────────────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar-left">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
      <span class="logo-text">InvoiceMate</span>
    </div>
    <div class="topbar-right">
      <span id="install-btn" class="btn btn-outline hidden" style="color:#fff;border-color:rgba(255,255,255,0.5);font-size:0.8rem;padding:6px 12px">Install</span>
    </div>
  </header>

  <!-- ── Main content area ───────────────────────────────── -->
  <main id="app">
    <div id="view-dashboard"  class="view"></div>
    <div id="view-invoices"   class="view hidden"></div>
    <div id="view-clients"    class="view hidden"></div>
    <div id="view-settings"   class="view hidden"></div>
  </main>

  <!-- ── Toast ───────────────────────────────────────────── -->
  <div id="toast" class="toast hidden"></div>

  <!-- ── Modal ───────────────────────────────────────────── -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal" class="modal">
      <button id="modal-close" class="modal-close">&#x2715;</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- ── Bottom nav ──────────────────────────────────────── -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="dashboard">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </button>
    <button class="nav-btn" data-view="invoices">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>Invoices</span>
    </button>
    <button class="nav-btn" data-view="clients">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
      <span>Clients</span>
    </button>
    <button class="nav-btn" data-view="settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <span>Settings</span>
    </button>
  </nav>

  <!-- ── Scripts ──────────────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/settings.js"></script>
  <script src="/js/clients.js"></script>
  <script src="/js/invoices.js"></script>
  <script src="/js/pdf.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
